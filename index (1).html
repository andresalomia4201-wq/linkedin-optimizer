// ─── HELPERS ────────────────────────────────────────────
function todayStr() {
  return new Date().toLocaleDateString("es-CO", { weekday:"long", day:"numeric", month:"long", year:"numeric" });
}

function CopyBtn({ text, id, copied, onCopy }) {
  return (
    <button onClick={() => onCopy(text, id)} style={{
      background: copied === id ? "#057642" : "#0A66C2",

      cursor:"pointer", fontSize:"12px", fontWeight:"700",
      transition:"background 0.2s", whiteSpace:"nowrap", flexShrink:0,
    }}>
      {copied === id ? "✓ Copiado" : "Copiar"}
    </button>
  );
}

function Note({ text }) {

// ─── TENDENCIAS TAB ──────────────────────────────────────
function TendenciasTab({ copied, onCopy }) {
  const [loading, setLoading] = useState(false);
  const [data, setData] = useState(null);
  const [error, setError] = useState(null);
  const [loadMsg, setLoadMsg] = useState("");

  const LOAD_MSGS = [
    "Buscando en la web tendencias de esta semana…",
    "Analizando lo más relevante para el mercado LAM…",
    "Preparando tus borradores de LinkedIn…",
  ];

  const fetchTrends = useCallback(async () => {
    setLoading(true);
    setData(null);
    setError(null);
    let msgIdx = 0;
    setLoadMsg(LOAD_MSGS[0]);
    const interval = setInterval(() => {
      msgIdx = (msgIdx + 1) % LOAD_MSGS.length;
      setLoadMsg(LOAD_MSGS[msgIdx]);
    }, 3500);

    try {
      const today = new Date().toLocaleDateString("es-CO", { day:"numeric", month:"long", year:"numeric" });
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({
          model:"claude-sonnet-4-20250514",
          max_tokens:2000,
          tools:[{ type:"web_search_20250305", name:"web_search" }],
          messages:[{
            role:"user",
            content:`Hoy es ${today}. Busca en la web las 3 tendencias más relevantes de ESTA SEMANA en alguno de estos temas: marketing digital, consumer goods, TikTok marketing, trade marketing, campañas de marcas en Latinoamérica.

Para cada tendencia genera un borrador de post de LinkedIn en español colombiano, tono profesional pero cercano, escrito en primera persona desde la perspectiva de Fabio Andrés: estudiante de Mercadeo en la UAO, Intern de Marketing Consumer LAM en Tesa Tape Colombia (Beiersdorf). El post debe conectar la tendencia con su experiencia o su campo de estudio.

Devuelve ÚNICAMENTE un objeto JSON válido, sin markdown, sin texto adicional, con esta estructura exacta:
{"semana":"descripción del período","tendencias":[{"titulo":"nombre corto","resumen":"una oración","relevancia_lam":"por qué importa en Colombia/LAM en una oración","post_linkedin":"texto completo 150-200 palabras con emojis y 4-5 hashtags al final"}]}`
          }],
        }),
      });

      const json = await res.json();
      // Extract text from all content blocks
      const rawText = (json.content || [])
        .filter(b => b.type === "text")
        .map(b => b.text)
        .join("");

      // Parse JSON — strip possible markdown fences
      const cleaned = rawText.replace(/```json|```/g, "").trim();
      const parsed = JSON.parse(cleaned);
      setData(parsed);
    } catch(e) {
      setError("No se pudo obtener las tendencias. Verifica tu conexión e intenta de nuevo.");
    } finally {
      clearInterval(interval);
      setLoading(false);
    }
  }, []);

  return (
    <div>
      {/* Header card */}
      <Card>
        <div style={{ display:"flex", alignItems:"flex-start", justifyContent:"space-between", gap:12, flexWrap:"wrap" }}>
          <div>
            <h2 style={{ margin:"0 0 4px", fontSize:15, fontWeight:800, color:"#0A66C2" }}>
              📰 Tendencias de la Semana
            </h2>
            <p style={{ margin:0, fontSize:13, color:"#5E7287", lineHeight:1.5 }}>
              Busca en tiempo real las tendencias de marketing más relevantes y te da los posts listos para publicar.
            </p>
          </div>
          <button
            onClick={fetchTrends}
            disabled={loading}
            style={{
              background: loading ? "#94A3B8" : "#0A66C2",
              color:"white", border:"none", padding:"10px 20px",
              borderRadius:"8px", cursor: loading ? "not-allowed" : "pointer",
              fontSize:13, fontWeight:700, whiteSpace:"nowrap",
              transition:"background 0.2s", flexShrink:0,
            }}
          >
            {loading ? "Buscando…" : "🔍 Buscar tendencias"}
          </button>
        </div>

        {/* Instructions */}
        {!loading && !data && (
          <div style={{
            marginTop:16, background:"#F7F9FC", borderRadius:8,
            border:"1px solid #E8ECF0", padding:"14px 16px",
          }}>
            <p style={{ margin:"0 0 10px", fontSize:12.5, fontWeight:700, color:"#3D4A58", textTransform:"uppercase", letterSpacing:"0.05em" }}>
              Cómo usar esto cada semana
            </p>
            {[
              ["📱","Pon una alarma recurrente los lunes a las 8am con el link de esta app"],
              ["🔍","Abre la app y haz clic en 'Buscar tendencias'"],
              ["✏️","Elige el post que más conecte contigo, agrega un detalle personal"],
              ["🚀","Publica en LinkedIn — eso es todo"],
            ].map(([icon, text], i) => (
              <div key={i} style={{ display:"flex", gap:10, alignItems:"flex-start", marginBottom:i<3?8:0 }}>
                <span style={{ fontSize:16, flexShrink:0 }}>{icon}</span>
                <span style={{ fontSize:13, color:"#3D4A58", lineHeight:1.5 }}>{text}</span>
              </div>
            ))}
          </div>
        )}
      </Card>

      {/* Loading state */}
      {loading && (
        <Card>
          <div style={{ display:"flex", flexDirection:"column", alignItems:"center", padding:"32px 0", gap:16 }}>
            <div style={{
              width:40, height:40, borderRadius:"50%",
              border:"3px solid #EEF3F8", borderTopColor:"#0A66C2",
            }} className="spinner" />
            <p style={{ margin:0, color:"#5E7287", fontSize:13.5, textAlign:"center", lineHeight:1.6 }}>
              {loadMsg}
            </p>
          </div>
        </Card>
      )}

      {/* Error state */}
      {error && (
        <div style={{ background:"#FEF2F2", border:"1px solid #FECACA", borderRadius:12, padding:"14px 16px", marginBottom:14 }}>
          <p style={{ margin:0, color:"#B91C1C", fontSize:13.5 }}>⚠️ {error}</p>
        </div>
      )}

      {/* Results */}
      {data && !loading && (
        <>
          <div style={{
            display:"flex", alignItems:"center", justifyContent:"space-between",
            marginBottom:4, padding:"0 2px",
          }}>
            <span style={{ fontSize:12, color:"#5E7287", fontWeight:600 }}>
              {data.semana || "Esta semana"} · {data.tendencias?.length || 0} tendencias
            </span>
            <button onClick={fetchTrends} style={{
              background:"transparent", border:"1px solid #D1D5DB",
              borderRadius:6, padding:"4px 10px", cursor:"pointer",
              fontSize:12, color:"#5E7287", fontWeight:600,
            }}>↻ Actualizar</button>
          </div>

          {(data.tendencias || []).map((t, i) => (
            <Card key={i} style={{ borderLeft:"3px solid #0A66C2" }}>
              {/* Trend header */}
              <div style={{ marginBottom:10 }}>
                <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:4 }}>
                  <span style={{
                    background:"#0A66C2", color:"white", fontSize:11,
                    fontWeight:700, padding:"2px 8px", borderRadius:20,
                  }}>#{i+1}</span>
                  <h3 style={{ margin:0, fontSize:14, fontWeight:800, color:"#1D2226" }}>{t.titulo}</h3>
                </div>
                <p style={{ margin:0, fontSize:13, color:"#5E7287", lineHeight:1.5 }}>{t.resumen}</p>
              </div>

              {/* LAM relevance */}
              <div style={{
                background:"#F0FDF4", border:"1px solid #BBF7D0",
                borderRadius:8, padding:"8px 12px", marginBottom:12,
              }}>
                <span style={{ fontSize:12, fontWeight:700, color:"#166534" }}>🌎 Por qué importa en LAM: </span>
                <span style={{ fontSize:12, color:"#166534" }}>{t.relevancia_lam}</span>
              </div>

              {/* LinkedIn post */}
              <div>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
                  <span style={{ fontSize:12, fontWeight:700, color:"#5E7287", textTransform:"uppercase", letterSpacing:"0.05em" }}>
                    Borrador para LinkedIn
                  </span>
                  <CopyBtn text={t.post_linkedin} id={`trend-${i}`} copied={copied} onCopy={onCopy} />
                </div>
                <pre style={{
                  margin:0, background:"#F7F9FC", border:"1px solid #E8ECF0",
                  borderRadius:8, padding:"14px 16px", fontSize:13,
                  color:"#1D2226", lineHeight:1.75, whiteSpace:"pre-wrap",
                  wordBreak:"break-word", fontFamily:"inherit",
                }}>{t.post_linkedin}</pre>
              </div>
            </Card>
          ))}
        </>
      )}
    </div>
  );
}

// ─── MAIN APP ────────────────────────────────────────────

Perfil: ${PROFILE.name}, estudiante de ${PROFILE.major} en ${PROFILE.university}.

Solicitud: ${aiInput}
Responde directo, sin introducción. Si generas texto para LinkedIn, entrégalo listo para copiar y pegar.`,

              </h2>
              <Note text={SECTIONS[activeTab].note} />
              <ContentBox text={SECTIONS[activeTab].content} copyId={activeTab} copied={copied} onCopy={copy} />
            </Card>
            {activeTab==="headline" && (
              <Card>
                <h3 style={{ margin:"0 0 12px", fontSize:14, fontWeight:700, color:"#1D2226" }}>
                  ¿Por qué este titular funciona?
                </h3>
                <ul style={{ margin:0, paddingLeft:18, color:"#3D4A58", fontSize:13.5, lineHeight:2 }}>
                  {SECTIONS.headline.why.map((w,i)=><li key={i}>{w}</li>)}
                </ul>
              </Card>
            )}
            {activeTab==="tesa" && (
              <div style={{ background:"#FFF7ED", border:"1px solid #FED7AA", borderRadius:12, padding:"14px 16px", fontSize:13, color:"#7C2D12", lineHeight:1.6 }}>
                <strong>🎯 Pro tip:</strong> Si puedes agregar métricas reales (ej: "coordiné envíos a 5+ países LAM" o "asistí al lanzamiento de 2 productos"), agrégalas. Los números multiplican el impacto de cada bullet.
              </div>
            )}
          </>
        )}

        {/* Skills */}
        {activeTab==="skills" && (
          <Card>
            <h2 style={{ margin:"0 0 12px", fontSize:15, fontWeight:800, color:"#0A66C2" }}>Habilidades a agregar</h2>
            <Note text={SECTIONS.skills.note} />
            <div style={{ marginBottom:14 }}>
              <p style={{ margin:"0 0 8px", fontSize:12, fontWeight:700, color:"#0A66C2", textTransform:"uppercase", letterSpacing:"0.06em" }}>⭐ Top 5</p>
              <div style={{ display:"flex", flexWrap:"wrap", gap:8 }}>
                {SECTIONS.skills.skills.filter(s=>s.top).map((s,i)=>(
                  <span key={i} style={{ background:"#EFF6FF", border:"1px solid #BFDBFE", color:"#1D4ED8", padding:"5px 13px", borderRadius:20, fontSize:13, fontWeight:600 }}>{s.name}</span>
                ))}
              </div>
            </div>
            <div>
              <p style={{ margin:"0 0 8px", fontSize:12, fontWeight:700, color:"#5E7287", textTransform:"uppercase", letterSpacing:"0.06em" }}>Adicionales</p>
              <div style={{ display:"flex", flexWrap:"wrap", gap:8 }}>
                {SECTIONS.skills.skills.filter(s=>!s.top).map((s,i)=>(
                  <span key={i} style={{ background:"#F7F9FC", border:"1px solid #E0E4E9", color:"#3D4A58", padding:"5px 13px", borderRadius:20, fontSize:13, fontWeight:500 }}>{s.name}</span>
                ))}
              </div>
            </div>
            <div style={{ marginTop:16 }}>
              <CopyBtn text={SECTIONS.skills.skills.map(s=>s.name).join(", ")} id="skills-list" copied={copied} onCopy={copy} />
            </div>
          </Card>
        )}

        {/* Tips */}
        {activeTab==="tips" && (
          <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
            {TIPS.map((tip,i)=>(
              <div key={i} style={{ background:tip.color, border:`1px solid ${tip.border}`, borderRadius:12, padding:"14px 16px" }}>
                <h3 style={{ margin:"0 0 6px", color:tip.tc, fontSize:14, fontWeight:700 }}>{tip.icon} {tip.title}</h3>
                <p style={{ margin:0, color:"#374151", fontSize:13.5, lineHeight:1.65 }}>{tip.text}</p>
              </div>
            ))}
          </div>
        )}

        {/* Tendencias */}
        {activeTab==="tendencias" && (
          <TendenciasTab copied={copied} onCopy={copy} />
        )}

        {/* AI */}
        {activeTab==="ai" && (
          <Card>
            <h2 style={{ margin:"0 0 6px", fontSize:15, fontWeight:800, color:"#0A66C2" }}>🤖 Refinar con IA</h2>
            <p style={{ margin:"0 0 16px", color:"#5E7287", fontSize:13.5, lineHeight:1.5 }}>
              Pídele a la IA que personalice cualquier sección, genere ideas de posts o responda dudas sobre tu perfil.
            </p>
            <div style={{ marginBottom:10 }}>
              <p style={{ margin:"0 0 6px", fontSize:12, fontWeight:700, color:"#5E7287" }}>IDEAS:</p>
              {[
                "Dame 5 ideas de posts para LinkedIn sobre mi experiencia en Tesa Tape",
                "Reescribe mi sección Sobre mí enfocándome más en marketing digital",
                "¿Cómo puedo destacar el Exposemillero 2025 en mi perfil?",
                "Genera un mensaje para conectar con un reclutador de P&G Colombia",
              ].map((q,i)=>(
                <button key={i} onClick={()=>setAiInput(q)} style={{
                  display:"block", width:"100%", textAlign:"left",
                  background:"#F7F9FC", border:"1px solid #E0E4E9", borderRadius:8,
                  padding:"8px 12px", marginBottom:6, cursor:"pointer",
                  fontSize:13, color:"#3D4A58", lineHeight:1.4,
                }}>"{q}"</button>
              ))}
            </div>
            <textarea
              value={aiInput}
              onChange={e=>setAiInput(e.target.value)}
              placeholder="Escribe tu pregunta o lo que necesitas mejorar..."
              rows={4}
              style={{
                width:"100%", padding:"12px", borderRadius:8,
                border:"1.5px solid #D1D5DB", fontSize:13.5,
                fontFamily:"inherit", resize:"vertical", outline:"none",
                color:"#1D2226", boxSizing:"border-box", lineHeight:1.6,
              }}
            />
            <button onClick={callAI} disabled={aiLoading || !aiInput.trim()} style={{
              marginTop:10, width:"100%",
              background: aiLoading || !aiInput.trim() ? "#94A3B8" : "#0A66C2",
              color:"white", border:"none", padding:11, borderRadius:8,
              cursor: aiLoading || !aiInput.trim() ? "not-allowed" : "pointer",
              fontSize:14, fontWeight:700, transition:"background 0.2s",
            }}>
              {aiLoading ? "Generando..." : "✨ Generar con IA"}
            </button>
            {aiOutput && (
              <div style={{ marginTop:16 }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
                  <span style={{ fontSize:13, fontWeight:700, color:"#0A66C2" }}>Respuesta:</span>
                  <CopyBtn text={aiOutput} id="ai-out" copied={copied} onCopy={copy} />
                </div>
                <pre style={{
                  margin:0, background:"#F0F7FF", border:"1px solid #BFDBFE",
                  borderRadius:8, padding:"14px 16px", fontSize:13.5,
                  color:"#1D2226", lineHeight:1.75, whiteSpace:"pre-wrap",
                  wordBreak:"break-word", fontFamily:"inherit",
                }}>{aiOutput}</pre>
              </div>
            )}
          </Card>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
